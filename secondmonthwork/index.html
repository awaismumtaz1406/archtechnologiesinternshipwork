<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SONATA — Music Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Grain overlay for texture -->
  <div class="grain" aria-hidden="true"></div>

  <div class="app-shell">

    <!-- ═══════════════════════════════════════
         LEFT PANEL: Now Playing + Controls
    ════════════════════════════════════════ -->
    <aside class="player-panel" role="complementary" aria-label="Now playing">

      <header class="brand">
        <span class="brand-logo">◈</span>
        <span class="brand-name">Malik Player</span>
      </header>

      <!-- Album Art (generated via CSS canvas gradient — no network) -->
      <div class="album-art-wrap">
        <div class="album-art" id="albumArt" aria-hidden="true">
          <div class="album-inner">
            <div class="album-label">
              <span class="album-label-dot"></span>
            </div>
          </div>
        </div>
        <div class="spinning-ring" id="spinRing" aria-hidden="true"></div>
      </div>

      <!-- Track info -->
      <div class="now-playing">
        <p class="now-playing-label">NOW PLAYING</p>
        <h1 class="track-title" id="trackTitle">Select a Track</h1>
        <p class="track-artist" id="trackArtist">—</p>
        <p class="track-genre" id="trackGenre"></p>
      </div>

      <!-- Progress bar -->
      <div class="progress-container" role="group" aria-label="Playback position">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-bar-wrap">
          <input
            type="range"
            id="progressBar"
            class="progress-bar"
            min="0" max="100" value="0" step="0.1"
            aria-label="Seek"
          />
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <span class="time-label" id="duration">0:00</span>
      </div>

      <!-- Transport controls -->
      <div class="controls" role="group" aria-label="Transport controls">
        <button class="ctrl-btn secondary" id="btnShuffle" aria-label="Shuffle" title="Shuffle">
          <!-- Shuffle icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
            <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btnPrev" aria-label="Previous track">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/>
          </svg>
        </button>
        <button class="ctrl-btn play-btn" id="btnPlay" aria-label="Play">
          <!-- Play icon (default) -->
          <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
          <!-- Pause icon (hidden by default) -->
          <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor" style="display:none">
            <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
          </svg>
        </button>
        <button class="ctrl-btn" id="btnNext" aria-label="Next track">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/>
          </svg>
        </button>
        <button class="ctrl-btn secondary" id="btnRepeat" aria-label="Repeat" title="Repeat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </button>
      </div>

      <!-- Volume -->
      <div class="volume-row" role="group" aria-label="Volume control">
        <button class="vol-icon" id="btnMute" aria-label="Mute">
          <svg id="iconVol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <div class="progress-bar-wrap vol-wrap">
          <input
            type="range"
            id="volumeBar"
            class="progress-bar"
            min="0" max="1" value="0.8" step="0.01"
            aria-label="Volume"
          />
          <div class="progress-fill" id="volumeFill" style="width:80%"></div>
        </div>
      </div>

      <!-- Hidden audio element -->
      <!--
        ASSUMPTION: Audio files are NOT included (no real .mp3 sources in this demo).
        Replace the `src` values in script.js playlist data with valid audio file paths
        or URLs to enable actual playback. All UI, progress, and state logic will
        work fully once real audio sources are provided.
      -->
      <audio id="audioPlayer" preload="metadata"></audio>

    </aside>

    <!-- ═══════════════════════════════════════
         RIGHT PANEL: Library / Playlist
    ════════════════════════════════════════ -->
    <main class="library-panel" role="main" aria-label="Music library">

      <div class="library-header">
        <h2 class="library-title">Library</h2>
        <div class="library-meta" id="libraryMeta">— tracks</div>
      </div>

      <!-- Search & Filter -->
      <div class="filter-bar" role="search">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Search tracks, artists…"
            aria-label="Search tracks"
            autocomplete="off"
          />
          <button class="clear-search" id="clearSearch" aria-label="Clear search" hidden>✕</button>
        </div>

        <!-- Genre filter chips -->
        <div class="genre-chips" id="genreChips" role="group" aria-label="Filter by genre">
          <!-- Chips generated by JS -->
        </div>
      </div>

      <!-- Playlist table header -->
      <div class="playlist-header" aria-hidden="true">
        <span class="col-num">#</span>
        <span class="col-title">TITLE</span>
        <span class="col-genre">GENRE</span>
        <span class="col-dur">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </span>
      </div>

      <!-- Playlist list -->
      <ul class="playlist" id="playlist" role="list" aria-label="Playlist">
        <!-- Track items injected by JS -->
      </ul>

      <!-- Empty state -->
      <div class="empty-state" id="emptyState" hidden>
        <span class="empty-icon">◈</span>
        <p>No tracks match your search.</p>
      </div>

    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
